<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premier League History Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3347;
    --text: #e8eaf0;
    --text-muted: #7c8398;
    --gold: #ffd700;
    --cl-blue: #1a56db;
    --el-green: #0e9f6e;
    --rel-red: #e02424;
    --mid: #374151;
    --panel-width: 380px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; overflow-x: hidden; }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.3px; }
  header h1 span { color: #38bdf8; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; align-items: center; }
  .btn-group { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .btn-group button {
    background: var(--surface); border: none; color: var(--text-muted);
    padding: 6px 12px; cursor: pointer; font-size: 12px; transition: all 0.15s;
  }
  .btn-group button:hover { background: var(--surface2); color: var(--text); }
  .btn-group button.active { background: #38bdf8; color: #000; font-weight: 600; }
  input[type="text"] {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 6px 12px; font-size: 12px; outline: none; width: 160px;
  }
  input[type="text"]:focus { border-color: #38bdf8; }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 12px; padding: 10px 24px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

  /* ── Main layout ── */
  .app { display: flex; height: calc(100vh - var(--header-h, 97px)); }

  /* ── Grid container ── */
  .grid-wrap {
    flex: 1; overflow: auto; position: relative;
    transition: margin-right 0.3s ease;
  }
  .grid-wrap.panel-open { margin-right: var(--panel-width); }
  table { border-collapse: collapse; min-width: max-content; }
  /* Trailing spacer so the last season column is never clipped at the scroll edge */
  table thead tr::after, table tbody tr::after {
    content: ''; display: table-cell; min-width: 16px;
  }

  /* ── Sticky corners & headers ── */
  thead th {
    position: sticky; top: 0; z-index: 50;
    background: var(--surface); border-bottom: 2px solid var(--border);
    padding: 8px 4px; text-align: center; font-size: 11px; color: var(--text-muted);
    white-space: nowrap;
  }
  thead th.team-col {
    position: sticky; left: 0; z-index: 60; min-width: 200px; max-width: 200px; text-align: left;
    padding: 8px 12px; border-right: 2px solid var(--border);
  }
  tbody td.team-name {
    position: sticky; left: 0; z-index: 10;
    background: var(--surface); border-right: 2px solid var(--border);
    padding: 6px 12px; font-weight: 500;
    min-width: 200px; max-width: 200px;
    height: auto;
  }
  tbody td.team-name .team-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 7px; flex-shrink: 0; }
  tbody td.team-name .team-label { display: flex; align-items: flex-start; gap: 7px; }
  tbody td.team-name .team-label-text { word-break: break-word; line-height: 1.3; }
  tbody td.team-name .team-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; line-height: 1.2; word-break: break-word; }
  tbody td.team-name .team-seasons { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* ── Cells ── */
  td.cell {
    width: 36px; min-width: 36px; height: 36px; text-align: center;
    font-size: 11px; font-weight: 700; cursor: pointer;
    border: 1px solid transparent; transition: transform 0.1s, box-shadow 0.1s;
    position: relative; vertical-align: middle;
  }
  td.cell:hover { transform: scale(1.15); z-index: 20; box-shadow: 0 0 0 2px #fff4; border-radius: 4px; }
  td.cell.selected { outline: 2px solid #fff; z-index: 21; border-radius: 2px; }
  td.cell.empty { background: #1a1d27; cursor: default; }
  td.cell.empty:hover { transform: none; box-shadow: none; }

  /* ── Row ── */
  tr:nth-child(even) td.team-name { background: #1c1f2e; }
  tr:nth-child(even) td.cell.empty { background: #1c1f2e; }
  tr:hover td.team-name { background: #252a3d !important; }

  /* ── Stats panel ── */
  .stats-panel {
    position: fixed; right: -420px; top: var(--header-h, 97px);
    width: var(--panel-width); height: calc(100vh - var(--header-h, 97px));
    background: var(--surface); border-left: 1px solid var(--border);
    transition: right 0.3s ease; z-index: 90;
    display: flex; flex-direction: column;
  }
  #panelContent { overflow-y: auto; flex: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .api-spinner { width:12px;height:12px;border:2px solid #38bdf8;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;display:inline-block; }
  .stats-panel.open { right: 0; }
  .panel-close {
    position: absolute; top: 10px; right: 10px; z-index: 200;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted);
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0;
  }
  .panel-close:hover { background: #ef4444; border-color: #ef4444; color: #fff; }
  .panel-header { padding: 16px 48px 16px 20px; border-bottom: 1px solid var(--border); }

  .panel-header { position: relative; }
  .panel-team-badge {
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  }
  .panel-color-bar { width: 5px; height: 48px; border-radius: 3px; flex-shrink: 0; }
  .panel-team-name { font-size: 1.2rem; font-weight: 700; }
  .panel-season { font-size: 0.9rem; color: var(--text-muted); }
  .pos-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: 50%; font-size: 1.1rem; font-weight: 900;
    margin-left: auto;
  }

  .panel-body { padding: 16px 20px; flex: 1; }
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface2); border-radius: 10px; padding: 12px 10px; text-align: center;
  }
  .stat-card .val { font-size: 1.5rem; font-weight: 800; }
  .stat-card .lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }

  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .stat-row .lbl { color: var(--text-muted); font-size: 12px; }
  .stat-row .val { font-weight: 600; }

  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin: 16px 0 8px; }

  .player-list { display: flex; flex-direction: column; gap: 6px; }
  .player-row {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--surface2); border-radius: 8px; padding: 8px 12px;
  }
  .player-row .pname { font-weight: 500; }
  .player-row .pstat { color: #38bdf8; font-weight: 700; }

  .note-box {
    background: var(--surface2); border-left: 3px solid #38bdf8;
    border-radius: 0 8px 8px 0; padding: 10px 14px;
    font-size: 12px; line-height: 1.5; color: var(--text-muted);
    margin-top: 12px;
  }

  .team-history { margin-top: 16px; }
  .history-bar-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .history-lbl { font-size: 11px; color: var(--text-muted); width: 70px; }
  .history-bar-bg { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .history-bar { height: 100%; border-radius: 4px; }

  /* ── Match results grid ── */
  .mr-header { display:flex; gap:8px; margin-bottom:8px; }
  .mr-ha-card {
    flex:1; background:var(--surface2); border-radius:8px; padding:8px 10px;
  }
  .mr-ha-card .hac-label { font-size:10px; text-transform:uppercase; letter-spacing:.6px; margin-bottom:3px; }
  .mr-ha-card .hac-rec { font-size:1rem; font-weight:800; }
  .mr-ha-card .hac-pts { font-size:10px; color:var(--text-muted); }
  .mr-grid { display:flex; flex-wrap:wrap; gap:3px; }
  .mr-cell {
    width:28px; height:38px; border-radius:5px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
    cursor:default; transition:transform .1s, box-shadow .1s; position:relative;
  }
  .mr-cell:hover { transform:scale(1.2); z-index:10; box-shadow:0 2px 8px #0008; }
  .mr-res { font-size:11px; font-weight:800; color:#fff; line-height:1; }
  .mr-ha  { font-size:8px; font-weight:600; line-height:1; }
  .mr-ha.H { color:#fbbf24; }
  .mr-ha.A { color:#93c5fd; }
  .mr-score { font-size:8px; color:rgba(255,255,255,.7); line-height:1; }
  .mr-pts-strip { display:flex; align-items:flex-end; gap:1px; height:34px; margin-top:8px; }
  .mr-pts-bar { flex:1; min-width:2px; border-radius:1px 1px 0 0; }
  .mr-note { font-size:9px; color:#374151; text-align:right; margin-top:3px; }
  .mr-cell { cursor:pointer; }

  /* ── Game detail popup ── */
  .game-popup {
    position: fixed; z-index: 9999;
    background: #1e2235; border: 1px solid #3a3f5c; border-radius: 12px;
    width: 240px; padding: 12px 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,.7);
    animation: gpIn .12s ease;
  }
  @keyframes gpIn { from { opacity:0; transform:scale(.95) translateY(-4px); } to { opacity:1; transform:scale(1); } }
  .gp-topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .gp-meta  { font-size:10px; color:#6b7280; }
  .gp-xbtn  { background:none; border:none; color:#6b7280; cursor:pointer; font-size:15px; line-height:1; padding:0 2px; }
  .gp-xbtn:hover { color:#fff; }
  .gp-scoreline { text-align:center; margin-bottom:8px; }
  .gp-score-big { font-size:1.6rem; font-weight:900; letter-spacing:-1px; }
  .gp-teams-row { display:grid; grid-template-columns:1fr auto 1fr; font-size:10px; color:#9ca3af; gap:4px; margin-top:2px; }
  .gp-teams-row .ht { text-align:left; } .gp-teams-row .at { text-align:right; }
  .gp-divider { height:1px; background:#2e3347; margin:8px 0; }
  .gp-goal-list { display:flex; flex-direction:column; gap:3px; max-height:180px; overflow-y:auto; }
  .gp-goal { display:flex; align-items:center; gap:5px; font-size:11px; padding:2px 0; }
  .gp-goal .gmin  { color:#6b7280; font-size:10px; min-width:26px; text-align:right; flex-shrink:0; }
  .gp-goal .gname { flex:1; }
  .gp-goal.opp    { flex-direction:row-reverse; color:#9ca3af; }
  .gp-goal.opp .gname { text-align:right; }
  .gp-empty { font-size:11px; color:#6b7280; text-align:center; padding:6px 0; }

  /* ── Season comparison chart ── */
  .sc-tabs { display:flex; gap:4px; margin-bottom:10px; }
  .sc-tab {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-muted); padding: 4px 10px; font-size: 11px; cursor: pointer; transition: all 0.15s;
  }
  .sc-tab:hover { border-color: #38bdf8; color: var(--text); }
  .sc-tab.active { background: #38bdf8; border-color: #38bdf8; color: #000; font-weight: 700; }
  .sc-row {
    display: grid; grid-template-columns: 18px 1fr auto;
    align-items: center; gap: 6px; margin-bottom: 3px;
    padding: 3px 6px; border-radius: 5px; transition: background 0.1s;
  }
  .sc-row:hover { background: var(--surface2); }
  .sc-row.sc-selected {
    background: var(--surface2); outline: 1px solid #ffffff44; border-radius: 6px;
  }
  .sc-pos { font-size: 10px; color: var(--text-muted); text-align: right; }
  .sc-bar-wrap { position: relative; height: 14px; }
  .sc-bar-bg { position:absolute; inset:0; background: #1e2033; border-radius: 3px; overflow: hidden; }
  .sc-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .sc-name-val { display:flex; justify-content:space-between; align-items:center;
    position:absolute; inset:0; padding: 0 5px; z-index:1; }
  .sc-name { font-size: 10px; font-weight: 500; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; max-width: 120px; text-shadow: 0 1px 2px #000a; }
  .sc-val { font-size: 10px; font-weight: 700; color: #fff; text-shadow: 0 1px 2px #000a; flex-shrink:0; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a5568; }

  /* ── Color mode – Goals ── */
  .color-mode-goals td.cell { color: #fff; }

  /* ── Season column header ── */
  .season-hdr { writing-mode: vertical-lr; transform: rotate(180deg); padding: 6px 2px; cursor: pointer; font-size: 10px; }
  .season-hdr:hover { color: var(--text); }
  .season-hdr.champion-col { color: var(--gold) !important; }

  .champ-star { font-size: 9px; }

  /* ── Responsive ── */

  /* Tablet: panel overlays grid (no margin push), full height */
  @media (max-width: 959px) {
    :root { --panel-width: 360px; }
    .grid-wrap.panel-open { margin-right: 0; }
    .stats-panel {
      top: 0 !important; height: 100vh !important; height: 100dvh !important;
      z-index: 200;
      box-shadow: -6px 0 32px #0009;
    }
  }

  /* Mobile: full-screen panel, compact header, smaller cells */
  @media (max-width: 599px) {
    :root { --panel-width: 100vw; }

    header { padding: 10px 14px; gap: 8px; }
    header h1 { font-size: 1rem; white-space: nowrap; }
    .controls { gap: 6px; }
    .btn-group button { padding: 5px 8px; font-size: 11px; }
    input[type="text"] { width: 120px; padding: 5px 10px; font-size: 11px; }

    .legend { padding: 6px 14px; gap: 8px; }
    .legend-item { font-size: 10px; }

    td.cell { width: 28px; min-width: 28px; height: 28px; font-size: 10px; }
    tbody td.team-name, thead th.team-col { min-width: 140px; max-width: 140px; padding: 4px 8px; font-size: 11px; }

    /* Game popup: center on screen instead of anchoring to cell */
    .game-popup {
      position: fixed !important;
      left: 50% !important; top: 50% !important;
      transform: translate(-50%, -50%) !important;
      width: min(300px, calc(100vw - 24px)) !important;
    }
  }
</style>
</head>
<body>

<header>
  <h1>Premier League <span>History</span> Dashboard</h1>
  <div class="controls">
    <input type="text" id="searchTeam" placeholder="Search team…" oninput="filterTeams(this.value)">
    <div class="btn-group">
      <button class="active" onclick="setSort('seasons')" id="sort-seasons">Most Seasons</button>
      <button onclick="setSort('best')" id="sort-best">Best Finish</button>
      <button onclick="setSort('alpha')" id="sort-alpha">A–Z</button>
    </div>
    <div class="btn-group">
      <button class="active" onclick="setColorMode('position')" id="mode-position">Position</button>
      <button onclick="setColorMode('goals')" id="mode-goals">Goals</button>
      <button onclick="setColorMode('gd')" id="mode-gd">Goal Diff</button>
      <button onclick="setColorMode('pts')" id="mode-pts">Points</button>
      <button onclick="setColorMode('cleansheets')" id="mode-cleansheets">Clean Sheets</button>
    </div>
  </div>
</header>

<div class="legend" id="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#ffd700"></div>Champion</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#1e40af"></div>Top 4 (UCL)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#065f46"></div>5–7 (Europa)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#374151"></div>Mid-table</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#7f1d1d"></div>Relegated</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#1a1d27; border:1px solid #2e3347"></div>Not in PL</div>
</div>

<div class="app">
  <div class="grid-wrap" id="gridWrap">
    <table id="mainTable">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="stats-panel" id="statsPanel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div id="panelContent"></div>
  </div>
</div>

<script>
// AbortController-based timeout compatible with all modern browsers
function fetchTimeout(url, ms) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(id));
}

// Full standings data — each entry: [pos, team, P, W, D, L, GF, GA, Pts]
const RAW = {
"1992-93":[

// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
let colorMode = 'position';
let sortMode = 'seasons';
let searchFilter = '';
let selectedCell = null;

// ════════════════════════════════════════════════════════════════
//  BUILD TEAM INDEX
// ════════════════════════════════════════════════════════════════
// Map team → season → row data
const teamSeasonMap = {};
for (const [season, rows] of Object.entries(RAW)) {
  for (const row of rows) {
    const [pos, team, p, w, d, l, gf, ga, pts] = row;
    if (!teamSeasonMap[team]) teamSeasonMap[team] = {};
    teamSeasonMap[team][season] = { pos, p, w, d, l, gf, ga, gd: gf - ga, pts };
  }
}

const ALL_TEAMS = Object.keys(teamSeasonMap);

function teamSeasons(t) { return Object.keys(teamSeasonMap[t]).length; }
function teamBest(t) { return Math.min(...Object.values(teamSeasonMap[t]).map(s => s.pos)); }
function teamWorst(t) { return Math.max(...Object.values(teamSeasonMap[t]).map(s => s.pos)); }
function teamAvg(t) {
  const vals = Object.values(teamSeasonMap[t]).map(s => s.pos);
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}

// ════════════════════════════════════════════════════════════════
//  COLOR UTILITIES
// ════════════════════════════════════════════════════════════════
function lerp(a, b, t) { return a + (b-a)*t; }
function lerpColor(c1, c2, t) {
  const r1=parseInt(c1.slice(1,3),16), g1=parseInt(c1.slice(3,5),16), b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16), g2=parseInt(c2.slice(3,5),16), b2=parseInt(c2.slice(5,7),16);
  const r=Math.round(lerp(r1,r2,t)), g=Math.round(lerp(g1,g2,t)), b=Math.round(lerp(b1,b2,t));
  return `rgb(${r},${g},${b})`;
}

function positionColor(pos, maxPos) {
  if (pos === 1) return '#c8a400';
  if (pos <= 4) return lerpColor('#1e40af','#3b82f6',(pos-2)/2);
  if (pos <= 7) return lerpColor('#065f46','#059669',(pos-5)/2);
  if (pos <= 17) return lerpColor('#374151','#4b5563',(pos-8)/9);
  return lerpColor('#7f1d1d','#dc2626',(pos-18)/2);
}

function goalsColor(gf) {
  if (gf === null) return '#1a1d27';
  const t = Math.min(1, gf / 100);
  return lerpColor('#1e3a5f','#f59e0b', t);
}

function gdColor(gd) {
  if (gd === null) return '#1a1d27';
  if (gd > 0) { const t = Math.min(1, gd/70); return lerpColor('#1e3a2f','#10b981',t); }
  if (gd < 0) { const t = Math.min(1, Math.abs(gd)/70); return lerpColor('#3f1e1e','#ef4444',t); }
  return '#374151';
}

function ptsColor(pts) {
  if (pts === null) return '#1a1d27';
  const t = Math.min(1, (pts-20)/80);
  return lerpColor('#1e1e3a','#6366f1',t);
}

function cleanSheetsColor(team, season) {
  const data = teamSeasonMap[team]?.[season];
  if (!data) return '#1a1d27';
  const est = Math.round(data.w * 0.55 + data.d * 0.3);
  const t = Math.min(1, est / 25);
  return lerpColor('#1a1d27', '#0ea5e9', t);
}

function getCellColor(data, team, season) {
  if (!data) return null;
  if (colorMode === 'position') return positionColor(data.pos, 22);
  if (colorMode === 'goals') return goalsColor(data.gf);
  if (colorMode === 'gd') return gdColor(data.gd);
  if (colorMode === 'pts') return ptsColor(data.pts);
  if (colorMode === 'cleansheets') return cleanSheetsColor(team, season);
  return '#374151';
}

function textColor(bgColor) {
  if (!bgColor) return '#888';
  if (bgColor === '#c8a400') return '#000';
  return '#fff';
}

// ════════════════════════════════════════════════════════════════
//  SORT TEAMS
// ════════════════════════════════════════════════════════════════
function teamCleanSheets(team) {
  // Estimate total clean sheets across all seasons: sum of (wins * 0.55 + draws * 0.3)
  const seasons = Object.values(teamSeasonMap[team] || {});
  return seasons.reduce((sum, s) => sum + Math.round(s.w * 0.55 + s.d * 0.3), 0);
}

function getSortedTeams() {
  let teams = ALL_TEAMS.filter(t => t.toLowerCase().includes(searchFilter.toLowerCase()));
  if (sortMode === 'seasons') teams.sort((a,b) => teamSeasons(b)-teamSeasons(a) || teamAvg(a)-teamAvg(b));
  if (sortMode === 'best') teams.sort((a,b) => teamBest(a)-teamBest(b) || teamSeasons(b)-teamSeasons(a));
  if (sortMode === 'alpha') teams.sort();
  return teams;
}

// ════════════════════════════════════════════════════════════════
//  BUILD TABLE
// ════════════════════════════════════════════════════════════════
function buildTable() {
  const teams = getSortedTeams();
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');

  // Header
  thead.innerHTML = '';
  const hr = document.createElement('tr');
  const th0 = document.createElement('th');
  th0.className = 'team-col';
  th0.textContent = `Teams (${teams.length})`;
  hr.appendChild(th0);
  for (const s of SEASONS) {
    const th = document.createElement('th');
    const note = NOTES[s];
    const isChampion = note ? true : false;
    const span = document.createElement('span');
    span.className = 'season-hdr' + (isChampion ? ' champion-col':'');
    span.textContent = s;
    span.title = note ? `Champion: ${note.champion}` : s;
    th.appendChild(span);
    hr.appendChild(th);
  }
  thead.appendChild(hr);

  // Body
  tbody.innerHTML = '';
  for (const team of teams) {
    const tr = document.createElement('tr');
    const tdName = document.createElement('td');
    tdName.className = 'team-name';
    const color = TEAM_COLORS[team] || '#888';
    const best = teamBest(team);
    const seasons = teamSeasons(team);
    // Find the most recent season with the best finish
    const bestSeasons = Object.entries(teamSeasonMap[team] || {})
      .filter(([_, data]) => data.pos === best)
      .map(([season]) => season);
    const mostRecentBest = bestSeasons[bestSeasons.length - 1];
    const yearShort = (season) => {
      const [a, b] = season.split('-');
      return `${a.slice(2)}/${b}`;
    };
    tdName.title = team;
    tdName.innerHTML = `
      <div class="team-label">
        <span class="team-dot" style="background:${color}"></span>
        <span class="team-label-text">${shortTeamName(team)}</span>
      </div>
      <div class="team-meta">Best: ${best===1?'🏆 Champion':`${best}${ord(best)}`} (${yearShort(mostRecentBest)})</div>
      <div class="team-seasons">${seasons} seasons</div>
    `;
    tr.appendChild(tdName);

    for (const s of SEASONS) {
      const td = document.createElement('td');
      const data = teamSeasonMap[team]?.[s];
      if (data) {
        td.className = 'cell';
        const bg = getCellColor(data, team, s);
        td.style.background = bg;
        td.style.color = colorMode === 'position' ? textColor(bg) : '#fff';
        let cellText = data.pos;
        if (colorMode === 'goals') cellText = data.gf;
        else if (colorMode === 'gd') cellText = data.gd;
        else if (colorMode === 'pts') cellText = data.pts;
        else if (colorMode === 'cleansheets') cellText = Math.round(data.w * 0.55 + data.d * 0.3);
        td.textContent = cellText;
        td.dataset.team = team;
        td.dataset.season = s;
        if (selectedCell && selectedCell.team===team && selectedCell.season===s) {
          td.classList.add('selected');
        }
        td.addEventListener('click', () => openPanel(team, s));
      } else {
        td.className = 'cell empty';
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

function ord(n) {
  if (n===1) return 'st'; if (n===2) return 'nd'; if (n===3) return 'rd'; return 'th';
}

let scMetric = 'pts';

function setSCMetric(metric, team, season) {
  scMetric = metric;
  document.querySelectorAll('.sc-tab').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('sct-' + metric);
  if (el) el.classList.add('active');
  buildSeasonChart(metric, team, season);
}

function buildSeasonChart(metric, team, season) {
  const container = document.getElementById('seasonChart');
  if (!container) return;
  container.innerHTML = '';

  const rows = RAW[season];
  if (!rows) return;

  // For GD, find the absolute max to scale bars
  let maxVal, minVal;
  if (metric === 'gd') {
    const vals = rows.map(r => r[6] - r[7]);
    maxVal = Math.max(...vals);
    minVal = Math.min(...vals);
  } else {
    const key = { pts: 8, gf: 6, ga: 7 }[metric];
    maxVal = Math.max(...rows.map(r => r[key]));
    minVal = 0;
  }
  const range = maxVal - minVal || 1;

  for (const row of rows) {
    const [pos, tname, p, w, d, l, gf, ga, pts] = row;
    const gd = gf - ga;
    const val = metric === 'pts' ? pts : metric === 'gf' ? gf : metric === 'ga' ? ga : gd;
    const isSelected = tname === team;
    const tcolor = TEAM_COLORS[tname] || '#888';
    const posBg = positionColor(pos, rows.length);

    // Bar width: for GD, split around zero
    let barPct, barOffset = 0;
    if (metric === 'gd') {
      const zeroAt = (-minVal / range) * 100;
      if (val >= 0) {
        barOffset = zeroAt;
        barPct = (val / range) * 100;
      } else {
        barPct = (Math.abs(val) / range) * 100;
        barOffset = zeroAt - barPct;
      }
    } else {
      barPct = ((val - minVal) / range) * 100;
    }

    // Bar color: selected team uses team color, others use position color
    const barColor = isSelected ? tcolor : posBg;

    const scRow = document.createElement('div');
    scRow.className = 'sc-row' + (isSelected ? ' sc-selected' : '');

    const shortName = shortTeamName(tname);

    scRow.innerHTML = `
      <span class="sc-pos">${pos}</span>
      <div class="sc-bar-wrap">
        <div class="sc-bar-bg">
          <div class="sc-bar" style="width:${barPct}%;margin-left:${barOffset}%;background:${barColor};opacity:${isSelected?1:0.55};"></div>
        </div>
        <div class="sc-name-val">
          <span class="sc-name" style="color:${isSelected?'#fff':'#cbd5e1'};font-weight:${isSelected?700:400}">${isSelected ? '▶ ' : ''}${shortName}</span>
          <span class="sc-val" style="color:${metric==='gd'&&val>0?'#4ade80':metric==='gd'&&val<0?'#f87171':'#e2e8f0'}">${val > 0 && metric === 'gd' ? '+' : ''}${val}</span>
        </div>
      </div>
      <span></span>
    `;
    container.appendChild(scRow);
  }
}

// ESPN overrides for teams whose names aren't a substring of the ESPN display name
const ESPN_NAMES = {
  'WBA': 'West Bromwich Albion',
  'QPR': 'Queens Park Rangers',
};

function matchesESPNTeam(myTeam, espnDisplayName) {
  const espn = espnDisplayName.toLowerCase();
  const my = (ESPN_NAMES[myTeam] || myTeam).toLowerCase();
  return espn === my || espn.includes(my);
}

function espnSeasonDates(season) {
  // "2024-25" → { from:"20240801", to:"20250630" }
  const [a, b] = season.split('-');
  const endYear = parseInt(b) < 30 ? 2000 + parseInt(b) : 1900 + parseInt(b);
  return { from: `${a}0801`, to: `${endYear}0630` };
}

async function fetchRealMatches(team, season) {
  const { from, to } = espnSeasonDates(season);
  try {
    const r = await fetchTimeout(
      `https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard?dates=${from}-${to}&limit=500`,
      8000
    );
    if (!r.ok) return null;
    const j = await r.json();
    if (!j.events?.length) return null;

    const games = j.events
      .map(ev => {
        const comp = ev.competitions?.[0];
        const home = comp?.competitors?.find(c => c.homeAway === 'home');
        const away = comp?.competitors?.find(c => c.homeAway === 'away');
        if (!home || !away) return null;
        const isHome = matchesESPNTeam(team, home.team?.displayName || '');
        const isAway = !isHome && matchesESPNTeam(team, away.team?.displayName || '');
        if (!isHome && !isAway) return null;
        const myComp  = isHome ? home : away;
        const oppComp = isHome ? away : home;
        const gf = parseInt(myComp.score);
        const ga = parseInt(oppComp.score);
        if (isNaN(gf) || isNaN(ga)) return null;
        const opp = (oppComp.team?.displayName || '').replace(/ FC$/, '');
        return {
          ha: isHome ? 'H' : 'A',
          result: gf > ga ? 'W' : gf < ga ? 'L' : 'D',
          gf, ga, opp,
          date: ev.date?.split('T')[0] || '',
          espnId: ev.id,
          homeTeam: (home.team?.displayName || '').replace(/ FC$/, ''),
          awayTeam: (away.team?.displayName || '').replace(/ FC$/, ''),
          homeGoalStr: '', awayGoalStr: '',
          isHome,
        };
      })
      .filter(Boolean)
      .sort((a, b) => new Date(a.date) - new Date(b.date));

    return games.length >= 10 ? games : null;
  } catch { return null; }
}

function parseGoalDetails(str) {
  if (!str || !str.trim()) return [];
  return str.split(';')
    .map(p => p.trim()).filter(Boolean)
    .map(p => {
      // formats: "45':Name", "45'Name", "90+2':Name"
      const m = p.match(/^(\d+)(?:\+\d+)?['\s:]+(.+)$/);
      if (!m) return null;
      let name = m[2].trim()
        .replace(/\s*\(pen(?:alty)?\)\s*/i, ' ✦')
        .replace(/\s*\(o\.?g\.?\)\s*/i, ' (OG)');
      return { time: parseInt(m[1]), name };
    })
    .filter(Boolean)
    .sort((a, b) => a.time - b.time);
}

function parseToGoals(homeStr, awayStr, isHome) {
  const my  = parseGoalDetails(isHome ? homeStr : awayStr).map(g => ({ ...g, side: 'my'  }));
  const opp = parseGoalDetails(isHome ? awayStr : homeStr).map(g => ({ ...g, side: 'opp' }));
  const all = [...my, ...opp].sort((a, b) => a.time - b.time);
  return all.length ? all : null;
}

async function fetchESPNGoals(match) {
  try {
    let espnId = match.espnId || null;

    // If no stored ID, find it from the scoreboard on the match date
    if (!espnId && match.date) {
      const dateParam = match.date.replace(/-/g, '');
      const sbRes = await fetchTimeout(
        `https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard?dates=${dateParam}`,
        6000
      );
      const sb = await sbRes.json();
      const myWord  = ((match.isHome ? match.homeTeam : match.awayTeam) || '').split(' ')[0].toLowerCase();
      const oppWord = (match.opp || '').split(' ')[0].toLowerCase();
      for (const ev of (sb.events || [])) {
        const names = (ev.competitions?.[0]?.competitors || [])
          .map(c => (c.team?.displayName || '').toLowerCase());
        const hasMe  = names.some(n => n.includes(myWord));
        const hasOpp = oppWord.length < 2 || names.some(n => n.includes(oppWord));
        if (hasMe && hasOpp) { espnId = ev.id; break; }
      }
    }
    if (!espnId) return null;

    const smRes = await fetchTimeout(
      `https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/summary?event=${espnId}`,
      6000
    );
    const sm = await smRes.json();

    const myWord = ((match.isHome ? match.homeTeam : match.awayTeam) || '').split(' ')[0].toLowerCase();
    const goals = [];
    for (const ev of (sm.keyEvents || [])) {
      const isGoal = ev.scoringPlay === true
        || ev.type?.type === 'goal'
        || ev.type?.id === '70' || ev.type?.id === '58'
        || (ev.type?.text || '').toLowerCase() === 'goal';
      if (!isGoal) continue;
      const mins = parseInt(ev.clock?.displayValue) || Math.round((ev.clock?.value || 0) / 60);
      const name = ev.participants?.[0]?.athlete?.displayName
        || ev.participants?.[0]?.athlete?.shortName
        || '?';
      const teamName = (ev.team?.displayName || '').toLowerCase();
      goals.push({ time: mins, name, side: teamName.includes(myWord) ? 'my' : 'opp' });
    }
    return goals.length ? goals.sort((a, b) => a.time - b.time) : [];
  } catch { return null; }
}

async function handleGameClick(e, idx) {
  e.stopPropagation();
  document.querySelectorAll('.game-popup').forEach(el => el.remove());

  const match = window._mrMatches?.[idx];
  if (!match) return;

  const popup = document.createElement('div');
  popup.className = 'game-popup';

  // Position near the cell, keep within viewport
  const cr = e.currentTarget.getBoundingClientRect();
  const pw = 240;
  let left = cr.right + 8;
  let top  = cr.top;
  if (left + pw > window.innerWidth - 8) left = cr.left - pw - 8;
  if (top + 260 > window.innerHeight - 8) top = Math.max(8, window.innerHeight - 268);
  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';

  const venue    = match.ha === 'H' ? 'Home' : 'Away';
  const resultTx = match.result === 'W' ? 'Win' : match.result === 'D' ? 'Draw' : 'Loss';
  const resCol   = match.result === 'W' ? '#4ade80' : match.result === 'D' ? '#fbbf24' : '#f87171';
  const myTeam   = match.isHome ? match.homeTeam : match.awayTeam;
  const oppTeam  = match.opp || (match.isHome ? match.awayTeam : match.homeTeam) || '?';

  popup.innerHTML = `
    <div class="gp-topbar">
      <span class="gp-meta">${match.date || ''}${match.date ? ' · ' : ''}${venue}</span>
      <button class="gp-xbtn" onclick="this.closest('.game-popup').remove()">✕</button>
    </div>
    <div class="gp-scoreline">
      <div class="gp-score-big">${match.gf}<span style="color:#4b5563;font-weight:300;padding:0 4px">–</span>${match.ga}</div>
      <div class="gp-teams-row">
        <span class="ht">${match.isHome ? (myTeam || '—') : (oppTeam || '—')}</span>
        <span style="color:#6366f1;font-weight:700">${resultTx}</span>
        <span class="at">${match.isHome ? (oppTeam || '—') : (myTeam || '—')}</span>
      </div>
    </div>
    <div class="gp-divider"></div>
    <div class="gp-goal-list" id="gpGoals">
      <div class="gp-empty"><span class="api-spinner"></span></div>
    </div>
  `;

  document.body.appendChild(popup);

  const goalDiv = popup.querySelector('#gpGoals');
  if (!goalDiv || !popup.isConnected) return;

  let goals = null;

  // 1. Use goal strings already stored from the season fetch
  if (match.homeGoalStr || match.awayGoalStr) {
    goals = parseToGoals(match.homeGoalStr, match.awayGoalStr, match.isHome);
  }

  // 2. ESPN — works for all seasons ESPN covers (use stored espnId for instant lookup)
  if (!goals && (match.espnId || match.date)) {
    goals = await fetchESPNGoals(match);
  }

  if (!popup.isConnected) return;

  if (!goals || !goals.length) {
    goalDiv.innerHTML = match.gf === 0 && match.ga === 0
      ? '<div class="gp-empty">0 – 0</div>'
      : !match.espnId && !match.date
        ? '<div class="gp-empty">Simulated match — select a recent season for real scorer data</div>'
        : '<div class="gp-empty">Scorer data not available for this match</div>';
    return;
  }

  goalDiv.innerHTML = goals.map(g => `
    <div class="gp-goal ${g.side === 'opp' ? 'opp' : ''}">
      <span class="gmin">${g.time}'</span>
      <span>⚽</span>
      <span class="gname">${g.name}</span>
    </div>`).join('');
}

function generateMatchData(team, season) {
  const d = teamSeasonMap[team]?.[season];
  if (!d) return [];
  const { w, d: draws, l } = d;

  // Seeded xorshift so the same team/season always produces the same sequence
  let sv = 0;
  for (const c of (team + season)) sv = (Math.imul(sv, 31) + c.charCodeAt(0)) | 0;
  sv = sv || 1;
  const rand = () => {
    sv ^= sv << 13; sv ^= sv >> 17; sv ^= sv << 5;
    return (sv >>> 0) / 4294967296;
  };

  // Realistic PL home/away split: ~60% of wins at home, ~50% draws, ~35% losses
  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
  const hw = clamp(Math.round(w     * (.55 + rand()*.1)), 0, w);
  const hd = clamp(Math.round(draws * (.45 + rand()*.1)), 0, draws);
  const hl = clamp(Math.round(l     * (.30 + rand()*.1)), 0, l);
  const aw = w - hw, ad = draws - hd, al = l - hl;

  // Score generator: produce a plausible scoreline for a given result
  const winScore  = () => { const g=clamp(Math.floor(rand()*3)+1,1,5); return [g, clamp(Math.floor(rand()*g),0,g-1)]; };
  const drawScore = () => { const g=Math.floor(rand()*3);              return [g, g]; };
  const lossScore = () => { const g=clamp(Math.floor(rand()*3)+1,1,5); return [clamp(Math.floor(rand()*g),0,g-1), g]; };

  const matches = [];
  for (let i=0;i<hw;i++) { const [gf,ga]=winScore();  matches.push({ha:'H',result:'W',gf,ga}); }
  for (let i=0;i<aw;i++) { const [gf,ga]=winScore();  matches.push({ha:'A',result:'W',gf,ga}); }
  for (let i=0;i<hd;i++) { const [gf,ga]=drawScore(); matches.push({ha:'H',result:'D',gf,ga}); }
  for (let i=0;i<ad;i++) { const [gf,ga]=drawScore(); matches.push({ha:'A',result:'D',gf,ga}); }
  for (let i=0;i<hl;i++) { const [gf,ga]=lossScore(); matches.push({ha:'H',result:'L',gf,ga}); }
  for (let i=0;i<al;i++) { const [gf,ga]=lossScore(); matches.push({ha:'A',result:'L',gf,ga}); }

  // Fisher-Yates shuffle (seeded)
  for (let i=matches.length-1;i>0;i--) {
    const j=Math.floor(rand()*(i+1));
    [matches[i],matches[j]]=[matches[j],matches[i]];
  }
  return matches;
}

async function buildMatchChart(team, season) {
  const container = document.getElementById('matchChart');
  if (!container) return;

  container.innerHTML = `<div style="color:#6b7280;font-size:11px;padding:10px 0;display:flex;align-items:center;gap:8px">
    <span class="api-spinner"></span>Loading match results…
  </div>`;

  let matches = await fetchRealMatches(team, season);
  const isReal = !!matches;
  if (!matches) matches = generateMatchData(team, season);

  const d = teamSeasonMap[team]?.[season];
  if (!d || !matches.length) { container.innerHTML = '<p style="color:#4b5563;font-size:11px">No data available</p>'; return; }

  const hm = matches.filter(m=>m.ha==='H'), am = matches.filter(m=>m.ha==='A');
  const hw=hm.filter(m=>m.result==='W').length, hd=hm.filter(m=>m.result==='D').length, hl=hm.filter(m=>m.result==='L').length;
  const aw=am.filter(m=>m.result==='W').length, ad=am.filter(m=>m.result==='D').length, al=am.filter(m=>m.result==='L').length;
  const hpts=hw*3+hd, apts=aw*3+ad;

  const BG = {
    'W-H':'#166534','W-A':'#14532d',
    'D-H':'#92400e','D-A':'#78350f',
    'L-H':'#991b1b','L-A':'#7f1d1d'
  };

  window._mrMatches = matches;

  let cells = '', cum = 0;
  const cumPts = [];
  for (let i=0; i<matches.length; i++) {
    const m = matches[i];
    cum += m.result==='W' ? 3 : m.result==='D' ? 1 : 0;
    cumPts.push(cum);
    const bg = BG[`${m.result}-${m.ha}`];
    const oppLine = m.opp ? ` vs ${m.opp}` : '';
    const dateLine = m.date ? ` · ${m.date}` : '';
    const tip = `Game ${i+1}${dateLine}${oppLine} · ${m.ha==='H'?'Home':'Away'} · ${m.result==='W'?'Win':m.result==='D'?'Draw':'Loss'} ${m.gf}–${m.ga} · ${cum}pts`;
    cells += `<div class="mr-cell" style="background:${bg}" title="${tip}" onclick="handleGameClick(event,${i})">
      <span class="mr-res">${m.result}</span>
      <span class="mr-score">${m.gf}–${m.ga}</span>
      <span class="mr-ha ${m.ha}">${m.ha}</span>
    </div>`;
  }

  const maxPts = d.pts || 1;
  let bars = '';
  for (let i=0; i<cumPts.length; i++) {
    const h = Math.round((cumPts[i]/maxPts)*30)+2;
    const m = matches[i];
    const c = m.result==='W'?'#4ade80':m.result==='D'?'#fbbf24':'#f87171';
    bars += `<div class="mr-pts-bar" style="height:${h}px;background:${c};opacity:.75" title="After game ${i+1}: ${cumPts[i]}pts"></div>`;
  }

  const sourceNote = isReal
    ? `<span style="color:#22c55e">● Live data · TheSportsDB</span>`
    : `<span style="color:#6b7280">● Estimated from season record</span>`;

  // Calculate real clean sheets from match data
  if (isReal && matches.length) {
    const realCleanSheets = matches.filter(m => m.ga === 0).length;
    const cleanVal = document.getElementById('cleanSheetVal');
    if (cleanVal) {
      cleanVal.textContent = realCleanSheets;
      cleanVal.parentElement.querySelector('.lbl').textContent = 'Clean Sheets';
    }
  }

  container.innerHTML = `
    <div class="mr-header">
      <div class="mr-ha-card">
        <div class="hac-label" style="color:#fbbf24">🏠 Home</div>
        <div class="hac-rec">${hw}W–${hd}D–${hl}L</div>
        <div class="hac-pts">${hpts} pts · ${hm.length} games</div>
      </div>
      <div class="mr-ha-card">
        <div class="hac-label" style="color:#93c5fd">✈ Away</div>
        <div class="hac-rec">${aw}W–${ad}D–${al}L</div>
        <div class="hac-pts">${apts} pts · ${am.length} games</div>
      </div>
    </div>
    <div class="mr-grid">${cells}</div>
    <div class="mr-pts-strip">${bars}</div>
    <div class="mr-note">${sourceNote} · cumulative points</div>
  `;
}

  selectedCell = null;
  buildTable();
