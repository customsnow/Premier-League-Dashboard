name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No `cache: 'npm'` — that requires a committed lockfile and the
          # project's single devDep isn't worth the maintenance overhead.

      - name: Install dependencies
        run: npm install

      - name: Run Biome
        run: npx biome ci
